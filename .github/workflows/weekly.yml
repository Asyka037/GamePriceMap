name: Weekly metadata & calendar

on:
  schedule:
    - cron: '0 9 * * 1'   # Mondays 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-refresh     # shares the daily group: never overlaps commits
  cancel-in-progress: false

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Unit tests
        run: npm test

# Metadata refresh moved to daily.yml as a 1/14 catch-up shard (Phase S2);
# a manual full sweep remains available: node scripts/scrape-meta.mjs

      - name: Scrape Xbox US POC (approved mappings only)
        run: npm run scrape:xbox

      - name: Scrape curated Steam editions and add-ons
        run: npm run scrape:steam-offers

      - name: Evolve price history (includes Xbox US)
        run: npm run history:observations

      - name: Build catalog candidates (human-reviewed)
        run: node scripts/suggest-catalog.mjs

      - name: Validate data gate
        run: npm run validate

      - name: Commit and push data
        run: |
          git config user.name "gamepricemap-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes."
            exit 0
          fi
          git commit -m "chore(data): weekly refresh $(date -u +%F)"
          git pull --rebase origin main
          git push origin main
