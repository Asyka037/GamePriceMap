name: Daily data refresh

on:
  schedule:
    - cron: '30 7 * * *'   # 07:30 UTC, matches plan §2 cadence
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Scrape Steam regional prices — core tier (writes rates + snapshots)
        run: npm run scrape:steam -- --tier=core

      - name: Scrape Steam regional prices — most overdue extended shard
        run: npm run scrape:steam -- --tier=extended --shard=auto

      - name: Scrape eShop regional prices (reuses fresh rates)
        run: npm run scrape:eshop

      - name: Refresh deal + free-game feeds
        run: node scripts/scrape-feeds.mjs

      - name: Refresh release calendar + artwork
        run: node scripts/scrape-calendar.mjs

      - name: Refresh metadata — most overdue shard (1/14 daily)
        run: node scripts/scrape-meta.mjs --shard=auto

      - name: Evolve price history + ATL seeds
        run: npm run history

      - name: Unit tests
        run: npm test

      - name: Validate data gate (compares against HEAD)
        run: npm run validate

      - name: Commit and push data
        run: |
          git config user.name "gamepricemap-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes today."
            exit 0
          fi
          git commit -m "chore(data): daily refresh $(date -u +%F)"
          git pull --rebase origin main
          git push origin main

      # Phase 6: trigger Cloudflare Pages deploy hook after data lands.
      # - name: Deploy site
      #   run: curl -fsS -X POST "${{ secrets.PAGES_DEPLOY_HOOK }}"
